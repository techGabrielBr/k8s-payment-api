apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      containers:
      - name: payments-api
        image: techgabriel/payments-api:latest
        ports:
          - containerPort: 8084
        envFrom:
          - configMapRef:
              name: payments-api-config
          - secretRef:
              name: payments-api-secret